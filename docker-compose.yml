version: "3.9"

services:
  rmf-ai-agent:
    build: .
    container_name: rmf-ai-agent
    ports:
      - "18789:18789"
    volumes:
      - ./config/config.yaml:/app/config/config.yaml:ro
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - RMF_API_URL=${RMF_API_URL:-http://host.docker.internal:8000}
    network_mode: host   # needed for BLE and mDNS to reach local network
    restart: unless-stopped
